<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в сервис</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="login-card">
        <h1>Вход в сервис</h1>

        <div class="input-group">
            <label for="username">Логин</label>
            <input type="text" id="username" placeholder="Введите логин">
        </div>

        <div class="input-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="Введите пароль">
        </div>

        <button class="submit-btn" onclick="checkLogin()">Войти</button>

        <div class="footer-text">
            В случае утери логина или пароля обратитесь к<br>
            ответственному лицу
        </div>
    </div>

    <script>
        function checkLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === 'worker' && password === 'worker') {
                window.location.href = 'forworker/quest.html';
            } else if (username === 'supervisor' && password === 'supervisor') {
                window.location.href = 'forsupervisor/quest2.html';
            } else {
                alert('Неверный логин или пароль');
            }
        }
    </script>

</body>
</html>
